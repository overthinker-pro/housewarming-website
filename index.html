<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Ooriyayil Housewarming</title>
  </head>
  <body>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Sekuya&display=swap");

      :root {
        --primary: #fff1d0;
        --secondary: #fff8ec;
        --text-main: #1d3557;
        --text-accent: #380201;
        --btn: #1d3557;
        --btn-hover: #7cafc4;
      }

      body {
        background: var(--primary);
        color: var(--text-main);
        font-family: "Sekuya", system-ui;
      }

      .section {
        background: var(--secondary);
      }

      h1,
      h2 {
        text-align: center;

        color: var(--text-accent);
      }

      p {
        color: var(--text-main);
      }

      .button {
        background: var(--btn);
        color: #fff;
        padding: 12px 20px;
        border-radius: 6px;
        transition: 0.3s;
      }

      .button:hover {
        background: var(--btn-hover);
      }

      .text-box {
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
      }
    </style>

    <div class="text-box">
      <h1>Housewarming Ceremony of Ooriyayil House</h1>
    </div>
  </body>
</html>
